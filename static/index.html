<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公車品情通報系統 - 管理後台</title>
    <link rel="stylesheet" href="/static/style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="bg-dark">
    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">🛠️</div>
                <h1>管理系統</h1>
                <p>請輸入管理員金鑰以繼續</p>
            </div>
            <div class="login-form">
                <input type="password" id="admin-token" placeholder="管理金鑰" onkeypress="if(event.key === 'Enter') loadReports()">
                <button onclick="loadReports()" class="btn-primary">登入後台</button>
            </div>
        </div>
    </div>
 
    <!-- Main Dashboard -->
    <div id="dashboard-content" class="hidden">
        <header class="main-header">
            <div class="header-left">
                <span class="brand">BusAppeal Admin</span>
                <div class="status-indicator">
                    <span class="dot"></span> 系統連線中
                </div>
            </div>
            <div class="user-actions">
                <label class="filter-toggle">
                    <input type="checkbox" id="hide-done-check" onchange="toggleHideDone()"> 隱藏已完成
                </label>
                <button onclick="loadReports()" class="btn-refresh">🔄 刷新資料</button>
                <button onclick="location.reload()" class="btn-secondary">登出</button>
            </div>
        </header>
 
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('tab-reports')">通報管理</button>
            <button class="tab-btn" onclick="switchTab('tab-gps')">車輛每日紀錄</button>
            <button class="tab-btn" onclick="switchTab('tab-plans')">營運方案分析</button>
        </div>
 
        <main>
            <!-- Tab: Reports -->
            <div id="tab-reports" class="tab-content active">
                <div class="dashboard-grid">
                    <!-- Sidebar Stats -->
                <aside class="stats-panel">
                    <div class="stat-card" data-status="pending">
                        <span class="label">待處理</span>
                        <span class="value" id="count-pending">0</span>
                    </div>
                    <div class="stat-card" data-status="progress">
                        <span class="label">維修中</span>
                        <span class="value" id="count-in-progress">0</span>
                    </div>
                    <div class="stat-card" data-status="done">
                        <span class="label">已完成</span>
                        <span class="value" id="count-done">0</span>
                    </div>
                </aside>
 
                <!-- Reports Table List -->
                <section class="reports-section">
                    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>📋 通報清單 (條列式)</h2>
                        <button onclick="openExportModal()" class="btn-secondary">📥 導出 PDF 報表</button>
                    </div>
                    <div class="table-container">
                        <table class="styled-table">
                            <thead>
                                <tr>
                                    <th width="40">#</th>
                                    <th width="80">狀態</th>
                                    <th width="100">車號</th>
                                    <th width="200">問題描述</th>
                                    <th width="200">處理方案</th>
                                    <th width="80">類型</th>
                                    <th width="80">里程</th>
                                    <th width="80">處理人</th>
                                    <th width="120">通報時間</th>
                                    <th width="120">完成時間</th>
                                    <th width="160">操作</th>
                                </tr>
                            </thead>
                            <tbody id="report-list">
                                <!-- Table rows injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
            </div>
 
            <!-- Tab: GPS Log -->
            <div id="tab-gps" class="tab-content hidden">
                <div class="gps-section">
                    <div class="gps-header">
                        <h2>🚌 車輛每日 GPS 紀錄 (07:00 - 23:00)</h2>
                        <div class="gps-controls">
                            <input type="date" id="gps-date-picker" onchange="loadGPSLog()">
                            <button class="btn-primary" onclick="loadGPSLog()">重新查詢</button>
                        </div>
                    </div>
                    <div class="gps-chart-container">
                        <div id="gps-timeline-chart"></div>
                    </div>
                </div>
            </div>
 
            <!-- Tab: Operating Plans -->
            <div id="tab-plans" class="tab-content hidden">
                <div class="plans-section">
                    <div class="section-header-row">
                        <h2>📊 車輛營運方案與中退分析</h2>
                        <div class="plans-controls">
                            <button class="btn-secondary" onclick="syncSchedules()">🔄 同步時刻表</button>
                            <button class="btn-primary" onclick="analyzeAllLogs()">🧠 批次分析現有紀錄</button>
                        </div>
                    </div>
                    
                    <div class="plans-filter">
                        <select id="plan-plate-filter" style="background: var(--surface-light); border: 1px solid var(--border); color: white; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; min-width: 150px;">
                            <option value="">選擇車號...</option>
                        </select>
                        <input type="date" id="plan-date-filter">
                        <button class="btn-primary" onclick="loadPlans()">🔍 查詢方案</button>
                        <button class="btn-secondary" onclick="analyzeSelectedVehicle()" id="btn-analyze-selected">🧠 分析此車紀錄</button>
                    </div>
 
                    <div id="plans-container" class="plans-list">
                        <!-- Plans cards will be injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
 
    <!-- Modal for details -->
    <div id="modal" class="hidden">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="modal-body"></div>
            
            <div id="solution-section" class="solution-section">
                <h4>🛠️ 處理方案 (Solution)</h4>
                <div id="solution-display" class="solution-text">暫無處理紀錄</div>
                <div class="solution-input-group">
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <input type="text" id="mileage-input" placeholder="請輸入里程 (如: 12345)" style="flex: 1; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white;">
                    </div>
                    <textarea id="solution-input" placeholder="請輸入維修結果或處理方案..."></textarea>
                    <button onclick="saveSolution()" class="btn-primary">儲存修改</button>
                </div>
            </div>
        </div>
    </div>
 
    <!-- Export Modal -->
    <div id="export-modal" class="hidden">
        <div class="modal-overlay" onclick="closeExportModal()"></div>
        <div class="modal-content" style="max-width: 450px;">
            <button class="close-btn" onclick="closeExportModal()">&times;</button>
            <h2 style="margin-bottom: 1.5rem;">📥 導出 PDF 報表</h2>
            
            <div class="detail-row">
                <label>導出類型</label>
                <select id="export-type" style="width:100%; padding: 0.8rem; border-radius: 8px; background: var(--surface-light); color: white; border: 1px solid var(--border);">
                    <option value="replacement">換件紀錄 (預設 7 天)</option>
                    <option value="report">通報紀錄 (預設 30 天)</option>
                </select>
            </div>
 
            <div class="detail-row" style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label>開始日期</label>
                    <input type="date" id="export-start" style="width:100%; padding: 0.8rem; border-radius: 8px; background: var(--surface-light); color: white; border: 1px solid var(--border);">
                </div>
                <div style="flex: 1;">
                    <label>結束日期</label>
                    <input type="date" id="export-end" style="width:100%; padding: 0.8rem; border-radius: 8px; background: var(--surface-light); color: white; border: 1px solid var(--border);">
                </div>
            </div>
 
            <div class="modal-actions">
                <button onclick="doExport()" class="btn-primary" style="width: 100%;">確認導出並下載</button>
            </div>
        </div>
    </div>
 
    <script src="/static/app.js?v=1.3"></script>
</body>
</html>
